name: build-push-deploy

# Autodeploy: todo push na main -> builda a imagem, envia ao GHCR e
# dispara o redeploy do serviço `markitdown` no EasyPanel.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger EasyPanel redeploy
        env:
          EP_URL: ${{ secrets.EASYPANEL_URL }}
          EP_KEY: ${{ secrets.EASYPANEL_API_KEY }}
        run: |
          echo "Disparando deployService (start/markitdown) no EasyPanel..."
          code=$(curl -sS -o /tmp/ep.json -w '%{http_code}' \
            -X POST "$EP_URL/api/trpc/services.app.deployService" \
            -H "Authorization: Bearer $EP_KEY" \
            -H "Content-Type: application/json" \
            -d '{"json":{"projectName":"start","serviceName":"markitdown"}}')
          echo "HTTP $code"
          cat /tmp/ep.json
          # 2xx = ok; qualquer outra coisa falha o job
          [ "${code#2}" != "$code" ] || { echo "::error::EasyPanel deploy retornou $code"; exit 1; }
